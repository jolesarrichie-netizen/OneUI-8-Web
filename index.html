<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>One UI 8.5 Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Virtual Phone Container -->
    <div class="phone-frame">
        <!-- Punch Hole Camera / Dynamic Island -->
        <div class="camera-notch"></div>

        <!-- System Status Bar -->
        <div class="status-bar">
            <span class="time">21:07</span>
            <div class="icons">
                <span class="signal">📶</span>
                <span class="wifi">📶</span>
                <span class="battery">🔋 100%</span>
            </div>
        </div>

        <!-- Main Screen View -->
        <div class="screen-content" id="app-screen">
            <!-- Settings App UI -->
            <div class="oneui-settings">
                <div class="settings-header">
                    <h1>About phone</h1>
                    <p class="subtitle">One UI 8.5</p>
                </div>
                
                <div class="settings-list">
                    <div class="menu-item">
                        <span>Device name</span>
                        <span class="value">Galaxy S26 Ultra</span>
                    </div>
                    <div class="menu-item">
                        <span>Software version</span>
                        <span class="value">One UI 8.5 / Android 16</span>
                    </div>
                    <div class="menu-item">
                        <span>Processor</span>
                        <span class="value">Snapdragon 8 Elite Gen 5</span>
                    </div>
                    <div class="menu-item">
                        <span>Battery health</span>
                        <span class="value">100% (5500 mAh)</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Bar -->
        <div class="nav-bar">
            <div class="nav-hint"></div>
        </div>
    </div>

</body>
</html>
